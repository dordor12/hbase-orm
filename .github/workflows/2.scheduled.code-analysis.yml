name: 'Scheduled: Code Analysis'

on:
  schedule:
    - cron: '27 3 * * 1'  # Weekly on Monday at 03:27 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/callable.code-analysis.codeql.yml

  trivy:
    name: Trivy
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/callable.code-analysis.trivy.yml
