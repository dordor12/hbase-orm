name: Benchmarks

on:
  workflow_call:

permissions:
  contents: write

jobs:
  benchmarks:
    name: JMH Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JMH Benchmarks
        run: ./gradlew :hbase-orm-test:jmh

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: hbase-orm-test/build/reports/jmh/
          retention-days: 30

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        if: always() && hashFiles('hbase-orm-test/build/reports/jmh/results.json') != ''
        with:
          tool: 'jmh'
          output-file-path: hbase-orm-test/build/reports/jmh/results.json
          gh-pages-branch: gh-benchmarks
          benchmark-data-dir-path: benchmarks/jmh
          auto-push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          comment-on-alert: true
          alert-threshold: '150%'
          comment-always: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate step summary
        if: always()
        run: |
          RESULTS="hbase-orm-test/build/reports/jmh/results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "No JMH results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## JMH Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Interactive charts: [GitHub Pages](https://dordor12.github.io/hbase-orm/benchmarks/jmh/)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full results table</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Benchmark | Score | Unit |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------:|------|" >> "$GITHUB_STEP_SUMMARY"

          python3 -c "
          import json, sys
          with open('$RESULTS') as f:
              data = json.load(f)
          for entry in data:
              name = entry.get('benchmark', '').split('.')[-1]
              score = entry.get('primaryMetric', {}).get('score', 0)
              unit = entry.get('primaryMetric', {}).get('scoreUnit', '')
              print(f'| {name} | {score:.2f} | {unit} |')
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
