name: Benchmarks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  benchmarks:
    name: JMH Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JMH Benchmarks
        run: ./gradlew :hbase-orm-test:jmh

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: hbase-orm-test/build/reports/jmh/
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          RESULTS="hbase-orm-test/build/reports/jmh/results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "No JMH results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## JMH Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Benchmark | Score | Unit |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------:|------|" >> "$GITHUB_STEP_SUMMARY"

          # Parse JSON array — each element has benchmark, primaryMetric.score, primaryMetric.scoreUnit
          python3 -c "
          import json, sys
          with open('$RESULTS') as f:
              data = json.load(f)
          for entry in data:
              name = entry.get('benchmark', '').split('.')[-1]
              score = entry.get('primaryMetric', {}).get('score', 0)
              unit = entry.get('primaryMetric', {}).get('scoreUnit', '')
              print(f'| {name} | {score:.2f} | {unit} |')
          " >> "$GITHUB_STEP_SUMMARY"
