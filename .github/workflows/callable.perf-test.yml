name: Performance Tests

on:
  workflow_call:

permissions:
  contents: write
  packages: read

jobs:
  perf-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull HBase test image
        run: docker pull ghcr.io/${{ github.repository_owner }}/hbase-test:2.4.18 || true

      - name: Run Performance Tests
        run: ./gradlew :hbase-orm-test:perfTest
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: 'true'
          HBASE_TEST_IMAGE: ghcr.io/${{ github.repository_owner }}/hbase-test:2.4.18

      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-test-results
          path: |
            hbase-orm-test/build/reports/perfTest/
            hbase-orm-test/build/reports/tests/perfTest/
            hbase-orm-test/build/test-results/perfTest/
          retention-days: 30

      - name: Convert results for benchmark-action
        if: always()
        run: |
          RESULTS="hbase-orm-test/build/reports/perfTest/results.json"
          if [ ! -f "$RESULTS" ]; then
            exit 0
          fi

          python3 -c "
          import json
          with open('$RESULTS') as f:
              data = json.load(f)
          output = []
          for entry in data:
              output.append({
                  'name': entry['name'] + ' (p50)',
                  'unit': 'us',
                  'value': entry['p50_us'],
                  'extra': f\"p95={entry['p95_us']:.1f}us p99={entry['p99_us']:.1f}us mean={entry['mean_us']:.1f}us throughput={entry['throughput_ops_sec']:.1f}ops/s\"
              })
          with open('benchmark-results.json', 'w') as f:
              json.dump(output, f, indent=2)
          "

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        if: always() && hashFiles('benchmark-results.json') != ''
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          gh-pages-branch: gh-benchmarks
          benchmark-data-dir-path: benchmarks/perf-test
          auto-push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          comment-on-alert: true
          alert-threshold: '150%'
          comment-always: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate step summary
        if: always()
        run: |
          RESULTS="hbase-orm-test/build/reports/perfTest/results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "No performance test results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## Performance Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Interactive charts: [GitHub Pages](https://dordor12.github.io/hbase-orm/benchmarks/perf-test/)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full results table</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Ops | p50 (us) | p95 (us) | p99 (us) | Mean (us) | Throughput (ops/s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|----:|--------:|--------:|--------:|---------:|------------------:|" >> "$GITHUB_STEP_SUMMARY"

          python3 -c "
          import json, sys
          with open('$RESULTS') as f:
              data = json.load(f)
          for entry in data:
              name = entry.get('name', '')
              ops = entry.get('ops', 0)
              p50 = entry.get('p50_us', 0)
              p95 = entry.get('p95_us', 0)
              p99 = entry.get('p99_us', 0)
              mean = entry.get('mean_us', 0)
              tp = entry.get('throughput_ops_sec', 0)
              print(f'| {name} | {ops} | {p50:.1f} | {p95:.1f} | {p99:.1f} | {mean:.1f} | {tp:.1f} |')
          " >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
