name: Publish to Maven Central

on:
  workflow_call:
    secrets:
      OSSRH_USERNAME:
        required: true
      OSSRH_PASSWORD:
        required: true
      GPG_SIGNING_KEY:
        required: true
      GPG_SIGNING_PASSPHRASE:
        required: true
      GPG_SIGNING_KEY_ID:
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central with Retry
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=60
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "=== Attempt $ATTEMPT of $MAX_RETRIES ==="

            if ./gradlew publishAndReleaseToMavenCentral --info --stacktrace; then
              echo "Publishing completed on attempt $ATTEMPT"
              exit 0
            else
              echo "Attempt $ATTEMPT failed"
              if [ $ATTEMPT -lt $MAX_RETRIES ]; then
                echo "Waiting $RETRY_DELAY seconds before retry..."
                sleep $RETRY_DELAY
              fi
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done

          echo "All $MAX_RETRIES attempts failed"
          exit 1
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
